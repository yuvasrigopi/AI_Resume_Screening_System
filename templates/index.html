<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>AI Resume Screening System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{

background:linear-gradient(135deg,#0f172a,#2563eb,#7c3aed);

min-height:100vh;

display:flex;

justify-content:center;

align-items:center;

padding:40px;

}

.container-box{

width:900px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(20px);

border-radius:25px;

padding:40px;

box-shadow:0 15px 35px rgba(0,0,0,.3);

color:white;

}

h1{

text-align:center;

font-weight:bold;

margin-bottom:8px;

}

.subtitle{

text-align:center;

opacity:.85;

margin-bottom:30px;

}

.stats{

display:flex;

gap:15px;

margin-bottom:30px;

}

.stat-card{

flex:1;

background:rgba(255,255,255,.12);

padding:20px;

border-radius:18px;

text-align:center;

transition:.3s;

}

.stat-card:hover{

transform:translateY(-5px);

background:rgba(255,255,255,.18);

}

.stat-card i{

font-size:35px;

margin-bottom:10px;

}

.upload-box{

border:3px dashed white;

border-radius:20px;

padding:35px;

text-align:center;

cursor:pointer;

transition:.3s;

display:block;

}

.upload-box:hover{

background:rgba(255,255,255,.12);

}

.upload-box i{

font-size:60px;

margin-bottom:15px;

}

input[type=file]{

display:none;

}

#fileText{

font-size:18px;

margin-top:15px;

font-weight:bold;

}

#fileList{

margin-top:20px;

}

.file-item{

background:rgba(255,255,255,.15);

padding:10px;

margin-bottom:8px;

border-radius:10px;

text-align:left;

}

textarea{

height:220px!important;

border-radius:15px!important;

padding:15px!important;

font-size:16px;

resize:none;

}

.btn-analyze{

width:100%;

padding:18px;

font-size:22px;

font-weight:bold;

border:none;

border-radius:15px;

background:linear-gradient(90deg,#06b6d4,#2563eb);

color:white;

transition:.3s;

}

.btn-analyze:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(0,0,0,.3);

}

.footer{

margin-top:25px;

text-align:center;

opacity:.75;

}

</style>

</head>

<body>

<div class="container-box">

<h1>

<i class="bi bi-robot"></i>

AI Resume Screening System

</h1>

<p class="subtitle">

Intelligent Applicant Tracking System

</p>

<div class="stats">

<div class="stat-card">

<i class="bi bi-file-earmark-person-fill"></i>

<h5>Multiple Resume Upload</h5>

</div>

<div class="stat-card">

<i class="bi bi-search"></i>

<h5>AI Resume Analysis</h5>

</div>

<div class="stat-card">

<i class="bi bi-bar-chart-fill"></i>

<h5>ATS Ranking</h5>

</div>

</div>

<form action="/upload"

method="POST"

enctype="multipart/form-data">

<label for="resumeInput" class="upload-box">

<input

id="resumeInput"

type="file"

name="resumes"

multiple

accept=".pdf"

required>

<i class="bi bi-cloud-arrow-up-fill"></i>

<h3>Click Here to Upload Resume(s)</h3>

<p>Hold CTRL while selecting multiple PDF resumes.</p>

<div id="fileText">

No Resume Selected

</div>

<div id="fileList">

</div>

</label>

<br>

<label>

<h5>

<i class="bi bi-file-earmark-text-fill"></i>

Job Description

</h5>

</label>

<textarea

class="form-control"

name="job_description"

placeholder="Paste Job Description Here..."

required>

</textarea>

<br>

<button

type="submit"

class="btn-analyze">

<i class="bi bi-cpu-fill"></i>

Analyze Resume(s)

</button>

</form>

<div class="footer">

AI Resume Screening System • Flask • Python

</div>

</div>

<script>

const input=document.getElementById("resumeInput");

const fileText=document.getElementById("fileText");

const fileList=document.getElementById("fileList");

input.addEventListener("change",function(){

fileList.innerHTML="";

if(this.files.length==0){

fileText.innerHTML="No Resume Selected";

return;

}

fileText.innerHTML="✅ "+this.files.length+" Resume(s) Selected";

for(let i=0;i<this.files.length;i++){

let div=document.createElement("div");

div.className="file-item";

div.innerHTML="📄 "+this.files[i].name;

fileList.appendChild(div);

}

});

</script>

</body>

</html>
